<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水邊圍邨 巴士站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 12px;
            line-height: 1.35;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            border: 4px solid #000;
            padding: 18px;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin: 0 0 6px 0;
            border-bottom: 3px solid #000;
            padding-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 14.5px;
            margin-bottom: 16px;
            color: #222;
        }
        .route {
            display: flex;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #999;
        }
        .route:last-child { border-bottom: none; }
        .route-num {
            font-size: 27px;
            font-weight: bold;
            width: 78px;
            text-align: center;
            border-right: 3px solid #000;
            margin-right: 14px;
            flex-shrink: 0;
        }
        .route-info { flex: 1; }
        .dest {
            font-size: 16px;
            margin-bottom: 4px;
            color: #222;
            font-weight: 500;
        }
        .time {
            font-size: 32px;
            font-weight: bold;
        }
        .count {
            font-size: 14.5px;
            color: #333;
        }
        .no-bus {
            font-size: 16px;
            color: #666;
            font-style: italic;
        }
        button {
            display: block;
            margin: 22px auto 8px;
            padding: 11px 26px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            max-width: 260px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>附近巴士站</h1>
        <p class="subtitle">水邊圍邨 (青山公路 - 元朗段)</p>

        <div id="routes"></div>

        <button onclick="fetchAllETAs()">重新整理</button>
        <div class="footer" id="update-time"></div>
    </div>

    <script>
        // 水邊圍邨三個主要站柱（往元朗/往屯門/天水圍方向）的正確九巴 16 位元 ID
        const KMB_STOPS = [
            "BCC6E5BA6810FED6", // 水邊圍邨 (往元朗市/元朗站方向)
            "A409A440D9CC2B12", // 水邊圍邨 (臨近水邊村，往天水圍/屯門方向)
            "546DBDFE56860E36"  // 水邊圍邨 (元朗大會堂/水邊劇場旁)
        ];

        const TARGET_ROUTES = [
            "276P", "53", "68A", "68X", "268B", "268P", "268X", 
            "269D", "E36", "N269", "N30", "B1", "64X", "76K"
        ];

        // 核心修改：改用政府 Data.gov.hk 的公共交通聯網 API，免除前端 CORS 阻擋問題
        async function fetchStopETA(stopId) {
            try {
                const response = await fetch(`https://wgo.data.gov.hk/api/v1/transport/kmb/stop-eta?stop_id=${stopId}`);
                if (!response.ok) return [];
                const data = await response.json();
                return data.data || [];
            } catch (e) {
                console.error("無法讀取站點資料:", stopId, e);
                return [];
            }
        }

        async function fetchAllETAs() {
            const container = document.getElementById('routes');
            container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#555;">正在連線政府數據庫查詢中...</div>';

            // 建立一個物件來存放每條路線最接近的班次
            const bestETAs = {};
            TARGET_ROUTES.forEach(r => bestETAs[r] = null);

            // 同步併發查詢所有站柱
            const promises = KMB_STOPS.map(stopId => fetchStopETA(stopId));
            const results = await Promise.all(promises);

            const now = new Date();

            // 處理所有站點撈回來的資料
            results.forEach(etas => {
                etas.forEach(item => {
                    const routeName = item.route;
                    // 如果是我們要的路線，且有預估時間
                    if (bestETAs.hasOwnProperty(routeName) && item.eta) {
                        const etaDate = new Date(item.eta);
                        
                        // 過濾掉已經過去超過 2 分鐘的車次
                        if (etaDate > new Date(Date.now() - 120000)) {
                            // 如果這個路線還沒記錄過，或者此班次比之前記錄的更早到達，則更新
                            if (!bestETAs[routeName] || etaDate < new Date(bestETAs[routeName].eta)) {
                                bestETAs[routeName] = item;
                            }
                        }
                    }
                });
            });

            // 渲染 HTML 畫面
            let html = '';
            for (const route of TARGET_ROUTES) {
                const info = bestETAs[route];
                
                html += `<div class="route">`;
                html += `<div class="route-num">${route}</div>`;
                html += `<div class="route-info">`;

                if (info && info.eta) {
                    const etaDate = new Date(info.eta);
                    const min = Math.round((etaDate - now) / 60000);
                    const destName = info.dest_tc || '目的地';
                    const timeStr = info.eta.substring(11, 16); // 擷取出 "HH:MM"

                    html += `<div class="dest">往 ${destName}</div>`;
                    html += `<div class="time">${timeStr}</div>`;
                    html += `<div class="count">${min > 0 ? min + ' 分鐘後' : '即將到達'}</div>`;
                } else {
                    html += `<div class="dest">${route} 線</div>`;
                    html += `<div class="no-bus">暫無班次 / 今日服務已結束</div>`;
                }

                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.getElementById('update-time').textContent = '更新於 ' + new Date().toLocaleTimeString('zh-HK');
        }

        // 初始化與定時器設定
        window.onload = fetchAllETAs;
        if (window.etaTimer) clearInterval(window.etaTimer);
        window.etaTimer = setInterval(fetchAllETAs, 30000);
    </script>
</body>
</html>
