<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>交通面板</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #006400; }
    .section { margin-bottom: 30px; }
    .item { padding: 8px; border-bottom: 1px solid #ccc; }
    .lrt-item { background: #f0fff0; }
    .kmb-item { background: #fff0f0; }
    .mtr-item { background: #f0f8ff; }
  </style>
</head>
<body>
  <h1>交通資訊面板</h1>

  <div class="section">
    <h2>輕鐵</h2>
    <div id="light-rail">載入中...</div>
  </div>

  <div class="section">
    <h2>九巴</h2>
    <div id="kmb">載入中...</div>
  </div>

  <div class="section">
    <h2>地鐵 (MTR)</h2>
    <div id="mtr">載入中...</div>
  </div>

  <script>
    // ====== API URL (請替換成實際來源) ======
    const lightRailAPI = "https://example.com/api/light-rail"; 
    const kmbAPI = "https://example.com/api/kmb"; 
    const mtrAPI = "https://example.com/api/mtr"; 

    // ====== 容器 ======
    const lightRailContainer = document.getElementById("light-rail");
    const kmbContainer = document.getElementById("kmb");
    const mtrContainer = document.getElementById("mtr");

    // ====== 載入輕鐵資料 ======
    function loadLightRail() {
      fetch(lightRailAPI)
        .then(response => {
          if (!response.ok) throw new Error("輕鐵 API 回應失敗: " + response.status);
          return response.json();
        })
        .then(data => {
          if (data && data.routes && data.routes.length > 0) {
            lightRailContainer.innerHTML = "";
            data.routes.forEach(route => {
              const item = document.createElement("div");
              item.className = "item lrt-item";
              item.innerHTML = `
                <strong>路線:</strong> ${route.name} <br>
                <strong>下一班:</strong> ${route.nextTrain || "暫無資料"}
              `;
              lightRailContainer.appendChild(item);
            });
          } else {
            lightRailContainer.innerHTML = "目前沒有輕鐵資料。";
          }
        })
        .catch(error => {
          console.error("輕鐵資料載入失敗:", error);
          lightRailContainer.innerHTML = "輕鐵資料載入失敗，請稍後再試。";
        });
    }

    // ====== 載入九巴資料 ======
    function loadKMB() {
      fetch(kmbAPI)
        .then(response => {
          if (!response.ok) throw new Error("九巴 API 回應失敗: " + response.status);
          return response.json();
        })
        .then(data => {
          if (data && data.routes && data.routes.length > 0) {
            kmbContainer.innerHTML = "";
            data.routes.forEach(route => {
              const item = document.createElement("div");
              item.className = "item kmb-item";
              item.innerHTML = `
                <strong>路線:</strong> ${route.name} <br>
                <strong>下一班:</strong> ${route.nextBus || "暫無資料"}
              `;
              kmbContainer.appendChild(item);
            });
          } else {
            kmbContainer.innerHTML = "目前沒有九巴資料。";
          }
        })
        .catch(error => {
          console.error("九巴資料載入失敗:", error);
          kmbContainer.innerHTML = "九巴資料載入失敗，請稍後再試。";
        });
    }

    // ====== 載入地鐵資料 ======
    function loadMTR() {
      fetch(mtrAPI)
        .then(response => {
          if (!response.ok) throw new Error("MTR API 回應失敗: " + response.status);
          return response.json();
        })
        .then(data => {
          if (data && data.lines && data.lines.length > 0) {
            mtrContainer.innerHTML = "";
            data.lines.forEach(line => {
              const item = document.createElement("div");
              item.className = "item mtr-item";
              item.innerHTML = `
                <strong>路線:</strong> ${line.name} <br>
                <strong>下一班:</strong> ${line.nextTrain || "暫無資料"}
              `;
              mtrContainer.appendChild(item);
            });
          } else {
            mtrContainer.innerHTML = "目前沒有地鐵資料。";
          }
        })
        .catch(error => {
          console.error("MTR 資料載入失敗:", error);
          mtrContainer.innerHTML = "地鐵資料載入失敗，請稍後再試。";
        });
    }

    // ====== 定時刷新 (每 30 秒更新一次) ======
    function refreshAll() {
      loadLightRail();
      loadKMB();
      loadMTR();
    }
    document.addEventListener("DOMContentLoaded", () => {
      refreshAll();
      setInterval(refreshAll, 30000);
    });
  </script>
</body>
</html>
