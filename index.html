<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輕鐵水邊圍站到站時間 (橫向墨水屏版)</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --border-line: #000000;
            --card-bg: #ffffff;
        }

        /* 針對橫向螢幕優化，鎖定高度並隱藏滾動條 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            border-bottom: 4px solid var(--border-line);
            padding-bottom: 5px;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .status-bar {
            padding: 6px 5px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-line);
            font-weight: bold;
        }

        .update-btn {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid var(--border-line);
            padding: 2px 10px;
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .update-btn:active {
            background-color: #000000;
            color: #ffffff;
        }

        /* 核心改動：使用 Flexbox 讓月台左右並排，並平分寬度 */
        .dashboard-grid {
            display: flex;
            flex: 1;
            gap: 25px;
            margin-top: 15px;
            overflow: hidden; /* 確保內容不超出 */
        }

        .platform-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
        }

        .platform-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text-main);
            border-bottom: 3px solid var(--border-line);
            padding-bottom: 5px;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .eta-table {
            width: 100%;
            border-collapse: collapse;
        }

        .eta-table th, .eta-table td {
            padding: 10px 5px;
            text-align: left;
            border-bottom: 1px dashed var(--border-line);
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .eta-table th {
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-line);
            padding-bottom: 5px;
        }

        .route-no {
            border: 2px solid var(--border-line);
            padding: 1px 6px;
            border-radius: 0;
            font-weight: 900;
            font-size: 1.05rem;
            display: inline-block;
            min-width: 40px;
            text-align: center;
        }

        .route-610, .route-614, .route-615, .route-761P { 
            background-color: transparent !important; 
            color: #000000 !important; 
        }

        /* 墨水屏高對比反相顯眼提示 */
        .time-highlight {
            background-color: #000000;
            color: #ffffff;
            padding: 2px 6px;
            font-weight: 900;
            display: inline-block;
        }

        .loading, .error-msg {
            grid-column: span 2;
            text-align: center;
            padding: 40px;
            background: white;
            border: 2px dashed var(--border-line);
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>輕鐵水邊圍站</h1>
    </header>
    
    <div class="status-bar">
        <span id="update-time">正在載入數據...</span>
        <button class="update-btn" onclick="fetchETA()">手動更新</button>
    </div>

    <div id="eta-container" class="dashboard-grid">
        <div class="loading">正在獲取實時到站時間...</div>
    </div>
</div>

<script>
    const STATION_ID = 570;
    const API_URL = `https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=${STATION_ID}`;

    async function fetchETA() {
        const container = document.getElementById('eta-container');
        const timeSpan = document.getElementById('update-time');
        
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('網路回應不成功');
            
            const data = await response.json();
            
            if (!data.platform_list || data.platform_list.length === 0) {
                container.innerHTML = '<div class="loading">目前沒有列車班次資料。</div>';
                return;
            }

            const now = new Date();
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            timeSpan.innerText = `最後更新: ${timeString}`;

            container.innerHTML = '';

            // 依據月台分組左右顯示
            data.platform_list.forEach(platform => {
                const platformId = platform.platform_id;
                const routeList = platform.route_list;

                const section = document.createElement('div');
                section.className = 'platform-section';

                let htmlContent = `
                    <h2 class="platform-title">${platformId} 號月台</h2>
                    <table class="eta-table">
                        <thead>
                            <tr>
                                <th style="width: 25%;">路線</th>
                                <th style="width: 45%;">目的地</th>
                                <th style="width: 30%;">預計到站</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                if (routeList.length === 0) {
                    htmlContent += `<tr><td colspan="3" style="text-align:center; color:#666; padding-top:20px;">暫無列車資訊</td></tr>`;
                } else {
                    routeList.forEach(route => {
                        let timeDisplay = route.time_en || '未知';
                        let isArriving = false;

                        if (timeDisplay.toLowerCase().includes('min')) {
                            const mins = parseInt(timeDisplay);
                            timeDisplay = `${mins} 分鐘`;
                            if (mins <= 1) isArriving = true;
                        } else if (timeDisplay.toLowerCase().includes('arr')) {
                            timeDisplay = '正在到站';
                            isArriving = true;
                        } else if (timeDisplay.toLowerCase().includes('dep')) {
                            timeDisplay = '正在離開';
                        }

                        const routeClass = `route-${route.route_no}`;

                        htmlContent += `
                            <tr>
                                <td><span class="route-no ${routeClass}">${route.route_no}</span></td>
                                <td><strong>${route.dest_ch}</strong></td>
                                <td><span class="${isArriving ? 'time-highlight' : ''}">${timeDisplay}</span></td>
                            </tr>
                        `;
                    });
                }

                htmlContent += `</tbody></table>`;
                section.innerHTML = htmlContent;
                container.appendChild(section);
            });

        } catch (error) {
            console.error('獲取數據失敗:', error);
            timeSpan.innerText = '更新失敗';
            container.innerHTML = `
                <div class="error-msg">
                    <p>未能載入實時數據</p>
                    <p style="font-size: 0.9rem; font-weight: normal;">請檢查網路連線。</p>
                </div>
            `;
        }
    }

    // 頁面載入時先執行一次
    fetchETA();

    // 依然維持你原本要求的 30 秒更新間距 (30000 毫秒)
    setInterval(fetchETA, 30000);
</script>

</body>
</html>
