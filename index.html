<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水邊圍邨 巴士站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 12px;
            line-height: 1.35;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            border: 4px solid #000;
            padding: 18px;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin: 0 0 6px 0;
            border-bottom: 3px solid #000;
            padding-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 14.5px;
            margin-bottom: 16px;
            color: #222;
        }
        .route {
            display: flex;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #999;
        }
        .route:last-child { border-bottom: none; }
        .route-num {
            font-size: 27px;
            font-weight: bold;
            width: 78px;
            text-align: center;
            border-right: 3px solid #000;
            margin-right: 14px;
            flex-shrink: 0;
        }
        .route-info { flex: 1; }
        .dest {
            font-size: 16px;
            margin-bottom: 4px;
            color: #222;
            font-weight: 500;
        }
        .time {
            font-size: 32px;
            font-weight: bold;
        }
        .count {
            font-size: 14.5px;
            color: #333;
        }
        .no-bus {
            font-size: 16px;
            color: #666;
            font-style: italic;
        }
        button {
            display: block;
            margin: 22px auto 8px;
            padding: 11px 26px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            max-width: 260px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>附近巴士站</h1>
        <p class="subtitle">水邊圍邨 (青山公路 - 元朗段)</p>

        <div id="routes"></div>

        <button onclick="fetchAllETAs()">重新整理</button>
        <div class="footer" id="update-time"></div>
    </div>

    <script>
        // 定義每條路線在水邊圍邨的準確站點 ID 以及九巴設定的方向 (inbound/outbound)
        // 這樣直接對準路線查，九巴官方 API 是允許跨網域 (CORS) 的！
        const ROUTE_CONFIGS = [
            { route: "276P", stop: "A409A440D9CC2B12", dir: "outbound" }, // 往上水
            { route: "53",   stop: "546DBDFE56860E36", dir: "inbound" },  // 往元朗形點
            { route: "68A",  stop: "A409A440D9CC2B12", dir: "inbound" },  // 往青衣站
            { route: "68X",  stop: "A409A440D9CC2B12", dir: "inbound" },  // 往旺角
            { route: "268B", stop: "A409A440D9CC2B12", dir: "inbound" },  // 往紅磡
            { route: "268P", stop: "A409A440D9CC2B12", dir: "inbound" },  // 往觀塘
            { route: "268X", stop: "A409A440D9CC2B12", dir: "inbound" },  // 往佐敦
            { route: "269D", stop: "A409A440D9CC2B12", dir: "inbound" },  // 往瀝源
            { route: "E36",  stop: "BCC6E5BA6810FED6", dir: "outbound" }, // 往八鄉路 (經元朗)
            { route: "N269", stop: "BCC6E5BA6810FED6", dir: "inbound" },  // 針對通宵線往美孚方向
            { route: "B1",   stop: "BCC6E5BA6810FED6", dir: "outbound" }, // 往落馬洲
            { route: "64X",  stop: "BCC6E5BA6810FED6", dir: "outbound" }, // 往大埔
            { route: "76K",  stop: "546DBDFE56860E36", dir: "outbound" }  // 往清河
        ];

        async function fetchETA(route, stopId, dir) {
            try {
                // 使用九巴官方原生的 Route-Stop-Service API
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta?route=${route}&service_type=1`);
                if (!response.ok) return null;
                const data = await response.json();
                
                // 篩選出屬於「水邊圍邨」這個特定站點的預估時間
                const stopEtas = (data.data || []).filter(item => item.stop === stopId && item.dir === dir);
                return stopEtas;
            } catch (e) {
                console.error(`查詢 ${route} 失敗:`, e);
                return null;
            }
        }

        async function fetchAllETAs() {
            const container = document.getElementById('routes');
            container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#555;">正在連線九巴數據庫...</div>';

            let html = '';
            const now = new Date();

            // 逐條路線平行發送請求，加快速度
            const promises = ROUTE_CONFIGS.map(cfg => fetchETA(cfg.route, cfg.stop, cfg.dir));
            const results = await Promise.all(promises);

            for (let i = 0; i < ROUTE_CONFIGS.length; i++) {
                const cfg = ROUTE_CONFIGS[i];
                const etas = results[i];
                
                // 找出有效（未過期）且最接近的一班車
                let best = null;
                if (etas && etas.length > 0) {
                    const valid = etas.filter(e => e.eta && new Date(e.eta) > new Date(Date.now() - 60000));
                    if (valid.length > 0) best = valid[0];
                }

                html += `<div class="route">`;
                html += `<div class="route-num">${cfg.route}</div>`;
                html += `<div class="route-info">`;

                if (best && best.eta) {
                    const etaDate = new Date(best.eta);
                    const min = Math.round((etaDate - now) / 60000);
                    const destName = best.dest_tc || '目的地';
                    const timeStr = best.eta.substring(11, 16); // 正常切出時:分

                    html += `<div class="dest">往 ${destName}</div>`;
                    html += `<div class="time">${timeStr}</div>`;
                    html += `<div class="count">${min > 0 ? min + ' 分鐘後' : '即將到達'}</div>`;
                } else {
                    html += `<div class="dest">${cfg.route} 線</div>`;
                    html += `<div class="no-bus">暫無班次 / 今日服務已結束</div>`;
                }

                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.getElementById('update-time').textContent = '更新於 ' + new Date().toLocaleTimeString('zh-HK');
        }

        window.onload = fetchAllETAs;
        if (window.etaTimer) clearInterval(window.etaTimer);
        window.etaTimer = setInterval(fetchAllETAs, 30000);
    </script>
</body>
</html>
