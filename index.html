<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水邊圍邨 巴士站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 12px;
            line-height: 1.35;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            border: 4px solid #000;
            padding: 18px;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin: 0 0 6px 0;
            border-bottom: 3px solid #000;
            padding-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 14.5px;
            margin-bottom: 16px;
            color: #222;
        }
        .route {
            display: flex;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #999;
        }
        .route:last-child { border-bottom: none; }
        .route-num {
            font-size: 27px;
            font-weight: bold;
            width: 78px;
            text-align: center;
            border-right: 3px solid #000;
            margin-right: 14px;
            flex-shrink: 0;
        }
        .route-info { flex: 1; }
        .dest {
            font-size: 16px;
            margin-bottom: 4px;
            color: #222;
            font-weight: 500;
        }
        .time {
            font-size: 32px;
            font-weight: bold;
        }
        .count {
            font-size: 14.5px;
            color: #333;
        }
        .no-bus {
            font-size: 16px;
            color: #444;
            font-style: italic;
        }
        button {
            display: block;
            margin: 22px auto 8px;
            padding: 11px 26px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            max-width: 260px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>附近巴士站</h1>
        <p class="subtitle">水邊圍邨 (YL356/YL357/YL358)</p>

        <div id="routes"></div>

        <button onclick="fetchAllETAs()">重新整理</button>
        <div class="footer" id="update-time"></div>
    </div>

    <script>
        // 水邊圍邨對應的正確九巴 Stop ID (請確保這些 ID 準確，第一組長 ID 可能是某些特定站柱)
        const STOPS = ["BCC6E5BA6810FED6", "YL357", "YL356"];

        const ROUTES = [
            "276P", "53", "68A", "68X", "268B", "268P", "268X", 
            "269D", "E36", "N269", "N30", "B1", "64X", "76K"
        ];

        // 修正 1：修復 API 網址字串嵌入語法
        async function fetchETA(route, stop, dir) {
            try {
                let response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${stop}/${route}/${dir}`);
                let data = await response.json();
                let etas = data.data || [];
                
                // 如果方向 1 沒資料，嘗試方向 2
                if (etas.length === 0 && dir === 1) {
                    response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${stop}/${route}/2`);
                    data = await response.json();
                    etas = data.data || [];
                }
                return etas;
            } catch (e) {
                console.error("Fetch error:", e);
                return [];
            }
        }

        // 檢查是否為未來的班次（容許 3 分鐘內的過去班次避免因時鐘誤差漏計）
        function isFuture(etaStr) {
            if (!etaStr) return false;
            return new Date(etaStr) > new Date(Date.now() - 180000);
        }

        async function fetchAllETAs() {
            const container = document.getElementById('routes');
            container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#555;">查詢中...</div>';

            let html = '';

            for (const route of ROUTES) {
                let best = null;

                for (const stopId of STOPS) {
                    const etas = await fetchETA(route, stopId, 1);
                    // 過濾出有時間且有效的預報
                    const valid = etas.filter(e => e.eta && isFuture(e.eta));
                    if (valid.length > 0) {
                        const candidate = valid[0];
                        // 挑選最接近現時抵達的班次
                        if (!best || new Date(candidate.eta) < new Date(best.eta)) {
                            best = candidate;
                        }
                    }
                }

                html += `<div class="route">`;
                html += `<div class="route-num">${route}</div>`;
                html += `<div class="route-info">`;
                
                if (best && best.eta) {
                    const etaDate = new Date(best.eta);
                    const min = Math.round((etaDate - new Date()) / 60000);
                    const destName = best.dest_tc || (route + ' 線');
                    
                    // 修正 2：九巴時間格式為 ISO 字串，需擷取時間部分（例：15:30）
                    const timeStr = best.eta.substring(11, 16); 
                    
                    html += `<div class="dest">往 ${destName}</div>`;
                    html += `<div class="time">${timeStr}</div>`;
                    html += `<div class="count">${min > 0 ? min + ' 分鐘後' : '即將到達'}</div>`;
                } else {
                    html += `<div class="dest">${route} 線</div>`;
                    html += `<div class="no-bus">暫無班次 / 今日服務已結束</div>`;
                }
                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.getElementById('update-time').textContent = '更新於 ' + new Date().toLocaleTimeString('zh-HK');
        }

        window.onload = fetchAllETAs;
        // 清除舊的定時器並重新設定（避免重複觸發）
        if (window.etaTimer) clearInterval(window.etaTimer);
        window.etaTimer = setInterval(fetchAllETAs, 30000);
    </script>
</body>
</html>
